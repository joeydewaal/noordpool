app = "noorpool-backend"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  RUST_LOG = "info"
  AVATAR_DIR = "/data/avatars"
  DATABASE_URL = "sqlite:///data/database.db"
  ALLOWED_ORIGINS = "https://noordpool.joeydewaal.com"
  PUBLIC_API_URL = "https://api.noordpool.joeydewaal.com"

[[mounts]]
  source = "noordpool_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "get"
    path = "/health"
    protocol = "http"
    timeout = "5s"

  [[http_service.ports]]
    port = 80
    handlers = ["http"]

  [[http_service.ports]]
    port = 443
    handlers = ["tls", "http"]
