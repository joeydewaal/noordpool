app = "noorpool-backend"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  RUST_LOG = "info"
  AVATAR_DIR = "/data/avatars"
  STATIC_DIR = "/app/static"

[[mounts]]
  source = "noordpool_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true

  [[http_service.ports]]
    port = 80
    handlers = ["http"]

  [[http_service.ports]]
    port = 443
    handlers = ["tls", "http"]
